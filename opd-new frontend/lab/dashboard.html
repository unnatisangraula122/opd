<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab Dashboard - General OPD</title>
    <link rel="stylesheet" href="../css/style.css?v=20260707" />
    <style>
      .test-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1rem;
        margin-bottom: 1rem;
        transition: all 0.2s;
      }
      .test-card:hover {
        transform: translateX(4px);
        border-color: var(--secondary);
      }
      .status-badge {
        display: inline-block;
        padding: 0.25rem 0.5rem;
        border-radius: 20px;
        font-size: 0.7rem;
      }
      .status-pending {
        background: #fef3c7;
        color: var(--warning);
      }
      .status-completed {
        background: #d1fae5;
        color: var(--success);
      }
      .status-processing {
        background: #dbeafe;
        color: var(--info);
      }
      .status-awaiting {
        background: #fef3c7;
        color: #92400E;
      }
      #reportViewModal .modal-content {
        max-width: 720px;
        width: 95%;
      }
      .report-preview-box {
        margin-top: 1rem;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: #f8fafc;
        overflow: hidden;
      }
      .report-preview-box iframe {
        display: block;
        width: 100%;
        height: 420px;
        border: none;
      }
      .report-preview-box img {
        display: block;
        max-width: 100%;
        max-height: 420px;
        margin: 0 auto;
      }
      .report-preview-placeholder {
        padding: 2rem;
        text-align: center;
        color: var(--text-muted);
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div class="sidebar-layout">
      <div class="sidebar">
        <div style="padding: 1.5rem">
          <div class="logo" style="margin-bottom: 2rem">
            <span class="logo-icon"></span
            ><span class="logo-text">GENERAL OPD</span>
          </div>
          <div style="text-align: center; margin-bottom: 2rem">
            <div
              style="
                width: 70px;
                height: 70px;
                background: rgba(59, 151, 151, 0.1);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 0 auto 1rem;
                color: var(--secondary);
              "
            >
              <span data-icon="microscope" data-icon-size="22"></span>
            </div>
            <h4>Lab Technician</h4>
            <p style="color: var(--text-muted)" id="labTechName">
              Lab Assistant
            </p>
          </div>
          <nav>
            <div class="sidebar-nav-item active" data-nav="pending" onclick="showTab('pending', this)">
              <span data-icon="flask" data-icon-size="18"></span> Pending Tests
            </div>
            <div class="sidebar-nav-item" data-nav="processing" onclick="showTab('processing', this)">
              <span data-icon="settings" data-icon-size="18"></span> In Progress
            </div>
            <div class="sidebar-nav-item" data-nav="completed" onclick="showTab('completed', this)">
              <span data-icon="checkCircle" data-icon-size="18"></span> Completed
            </div>
            <div
              class="sidebar-nav-item"
              onclick="logoutPortal('../index.html')"
            >
              <span data-icon="logout" data-icon-size="18"></span> Logout
            </div>
          </nav>
        </div>
      </div>

      <div class="main-content">
        <h1 style="margin-bottom: 1.5rem">Lab Dashboard</h1>

        <!-- Pending Tests Tab -->
        <div id="pendingTab">
          <div class="card">
            <h3>Pending Lab Tests</h3>
            <div id="pendingList"></div>
          </div>
        </div>

        <!-- Processing Tab -->
        <div id="processingTab" style="display: none">
          <div class="card">
            <h3>Tests In Progress</h3>
            <div id="processingList"></div>
          </div>
        </div>

        <!-- Completed Tab -->
        <div id="completedTab" style="display: none">
          <div class="card">
            <h3>Completed Tests</h3>
            <div id="completedList"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Result Modal -->
    <div id="resultModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Enter Test Results</h3>
          <button onclick="closeResultModal()">&times;</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label">Test Results</label>
            <textarea
              class="form-textarea"
              id="resultValue"
              rows="4"
              placeholder="Enter detailed test results..."
            ></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Normal Range</label>
            <input
              type="text"
              class="form-input"
              id="normalRange"
              placeholder="e.g., 100-200 mg/dL"
            />
          </div>
          <div class="form-group">
            <label class="form-label">Upload Report (PDF/Image)</label>
            <input
              type="file"
              class="form-input"
              id="reportFile"
              accept=".pdf,.jpg,.png"
            />
          </div>
          <div class="form-group">
            <label class="form-label">Additional Notes</label>
            <textarea
              class="form-textarea"
              id="labNotes"
              rows="2"
              placeholder="Any additional notes..."
            ></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeResultModal()">
            Cancel
          </button>
          <button class="btn btn-primary" onclick="submitResult()">
            Submit Result
          </button>
        </div>
      </div>
    </div>

    <!-- View Report Modal -->
    <div id="reportViewModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Lab Report</h3>
          <button type="button" onclick="closeReportModal()">&times;</button>
        </div>
        <div class="modal-body" id="reportViewBody"></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeReportModal()">Close</button>
          <a id="reportOpenLink" class="btn btn-outline" href="#" target="_blank" rel="noopener" style="display:none;">Open in New Tab</a>
          <a id="reportDownloadLink" class="btn btn-primary" href="#" download style="display:none;">Download File</a>
        </div>
      </div>
    </div>

    <script src="../js/icons.js"></script>
    <script src="../js/app.js?v=20260712f"></script>
    <script src="../js/api.js?v=20260712f"></script>
    <script>
      let pendingTests = [];
      let awaitingPaymentTests = [];
      let processingTests = [];
      let completedTests = [];
      let currentTestId = null;

      function mapLabItem(t, status) {
        return {
          id: t.order_id,
          order_id: t.order_id,
          patient: t.patient_name,
          patient_id: t.patient_id,
          token: t.token_number,
          tests: [t.test_name],
          status,
          orderedAt: t.ordered_at,
          startedAt: t.started_at,
          completedAt: t.completed_at,
          findings: t.findings || '',
          reportUrl: t.report_url || null,
          fee: t.fee,
        };
      }

      function formatLabDate(iso) {
        if (!iso) return '—';
        const d = new Date(iso);
        return Number.isNaN(d.getTime()) ? '—' : d.toLocaleString();
      }

      async function loadLabQueue() {
        try {
          const res = await API.labQueue();
          if (!res.success) {
            const msg = res.error || res.detail || 'Could not load lab queue';
            document.getElementById('pendingList').innerHTML =
              `<p style="text-align:center;color:var(--danger);">${msg}</p>`;
            return;
          }
          pendingTests = (res.pending || []).map((t) => mapLabItem(t, 'pending'));
          awaitingPaymentTests = (res.awaiting_payment || []).map((t) => mapLabItem(t, 'awaiting'));
          processingTests = (res.processing || []).map((t) => mapLabItem(t, 'processing'));
          completedTests = (res.completed || []).map((t) => mapLabItem(t, 'completed'));
          renderPending();
          renderProcessing();
          renderCompleted();
        } catch (err) {
          document.getElementById('pendingList').innerHTML =
            `<p style="text-align:center;color:var(--danger);">Failed to load lab queue. Please refresh.</p>`;
        }
      }

      function showTab(tab, navEl) {
        document.getElementById("pendingTab").style.display =
          tab === "pending" ? "block" : "none";
        document.getElementById("processingTab").style.display =
          tab === "processing" ? "block" : "none";
        document.getElementById("completedTab").style.display =
          tab === "completed" ? "block" : "none";

        if (typeof SidebarNav !== 'undefined') {
          SidebarNav.activate(navEl || document.querySelector(`[data-nav="${tab}"]`));
        }

        if (tab === "pending") loadLabQueue();
        if (tab === "processing") loadLabQueue();
        if (tab === "completed") loadLabQueue();
      }

      function renderPending() {
        const parts = [];

        if (pendingTests.length) {
          parts.push(pendingTests.map((t) => `
            <div class="test-card">
              <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                <div>
                  <h4>${PatientDisplay.label(t.patient, t.patient_id)} <span class="status-badge status-pending">Ready</span></h4>
                  <p><strong>Token:</strong> ${t.token} | <strong>Ordered:</strong> ${t.orderedAt ? new Date(t.orderedAt).toLocaleString() : '—'}</p>
                  <p><strong>Tests:</strong> ${t.tests.join(", ")}${t.fee ? ` | <strong>Fee:</strong> Rs. ${t.fee}` : ''}</p>
                </div>
                <button class="btn btn-primary" onclick="startTest(${t.id})">Start Test →</button>
              </div>
            </div>
          `).join(''));
        }

        if (awaitingPaymentTests.length) {
          parts.push(`
            <div class="alert alert-warning" style="margin: ${pendingTests.length ? '1.25rem' : '0'} 0 1rem;">
              <strong>Awaiting payment at reception</strong> — these tests appear after the lab fee is collected.
            </div>
          `);
          parts.push(awaitingPaymentTests.map((t) => `
            <div class="test-card" style="opacity: 0.92;">
              <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                <div>
                  <h4>${PatientDisplay.label(t.patient, t.patient_id)} <span class="status-badge status-awaiting">Payment Pending</span></h4>
                  <p><strong>Token:</strong> ${t.token} | <strong>Ordered:</strong> ${t.orderedAt ? new Date(t.orderedAt).toLocaleString() : '—'}</p>
                  <p><strong>Tests:</strong> ${t.tests.join(", ")}${t.fee ? ` | <strong>Fee due:</strong> Rs. ${t.fee}` : ''}</p>
                </div>
              </div>
            </div>
          `).join(''));
        }

        if (!parts.length) {
          document.getElementById("pendingList").innerHTML =
            '<p style="text-align:center; color:var(--text-muted);">No pending tests</p>';
          return;
        }

        document.getElementById("pendingList").innerHTML = parts.join('');
      }

      function renderProcessing() {
        if (processingTests.length === 0) {
          document.getElementById("processingList").innerHTML =
            '<p style="text-align:center; color:var(--text-muted);">No tests in progress</p>';
          return;
        }
        document.getElementById("processingList").innerHTML = processingTests
          .map(
            (t) => `
                <div class="test-card">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                        <div>
                            <h4>${PatientDisplay.label(t.patient, t.patient_id)} <span class="status-badge status-processing">In Progress</span></h4>
                            <p><strong>Token:</strong> ${t.token} | <strong>Started:</strong> ${formatLabDate(t.startedAt)}</p>
                            <p><strong>Tests:</strong> ${t.tests.join(", ")}</p>
                        </div>
                        <button class="btn btn-success" onclick="openResultModal(${t.id})">Add Results</button>
                    </div>
                </div>
            `,
          )
          .join("");
      }

      function renderCompleted() {
        if (completedTests.length === 0) {
          document.getElementById("completedList").innerHTML =
            '<p style="text-align:center; color:var(--text-muted);">No completed tests</p>';
          return;
        }
        document.getElementById("completedList").innerHTML = completedTests
          .map(
            (t) => `
                <div class="test-card">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                        <div>
                            <h4>${PatientDisplay.label(t.patient, t.patient_id)} <span class="status-badge status-completed">Completed</span></h4>
                            <p><strong>Token:</strong> ${t.token} | <strong>Completed:</strong> ${formatLabDate(t.completedAt)}</p>
                            <p><strong>Tests:</strong> ${t.tests.join(", ")}</p>
                            <p><strong>Result:</strong> ${t.findings || "See report"}</p>
                        </div>
                        <button type="button" class="btn btn-outline" onclick="viewReport(${t.id})">View Report</button>
                    </div>
                </div>
            `,
          )
          .join("");
      }

      async function startTest(id) {
        const test = pendingTests.find((t) => t.id === id);
        if (!test) return;
        const res = await API.labStart(test.order_id);
        if (!res.success) { Toast.show(res.error || 'Failed', 'error'); return; }
        await loadLabQueue();
        Toast.show(`Started processing tests for ${test.patient}`, "success");
      }

      function openResultModal(id) {
        currentTestId = id;
        document.getElementById("resultModal").classList.add("active");
      }

      async function submitResult() {
        const result = document.getElementById("resultValue").value;
        const notes = document.getElementById("labNotes").value;
        if (!result) { Toast.show("Please enter test results", "error"); return; }
        const test = processingTests.find((t) => t.id === currentTestId);
        if (!test) return;
        const formData = new FormData();
        formData.append('findings', `${result}. ${notes || ''}`);
        const fileInput = document.getElementById('reportFile');
        if (fileInput?.files?.[0]) {
          formData.append('report_file', fileInput.files[0]);
        }
        const res = await API.labComplete(test.order_id, formData);
        if (!res.success) { Toast.show(res.error || 'Failed', 'error'); return; }
        closeResultModal();
        await loadLabQueue();
        Toast.show("Report submitted successfully!", "success");
      }

      function reportPreviewHtml(url) {
        if (!url) {
          return '<div class="report-preview-placeholder">No report file uploaded — text findings only.</div>';
        }
        const lower = url.toLowerCase().split('?')[0];
        if (lower.endsWith('.pdf')) {
          return `<iframe src="${url}#toolbar=1" title="Lab report PDF"></iframe>`;
        }
        if (/\.(jpg|jpeg|png|gif|webp)$/i.test(lower)) {
          return `<img src="${url}" alt="Lab report image">`;
        }
        return `<div class="report-preview-placeholder">Inline preview not available.<br>Use <strong>Open in New Tab</strong> or <strong>Download</strong> below.</div>`;
      }

      function viewReport(id) {
        const test = completedTests.find((t) => t.id === id);
        if (!test) return;
        document.getElementById('reportViewBody').innerHTML = `
          <p><strong>Patient:</strong> ${PatientDisplay.label(test.patient, test.patient_id)}</p>
          <p><strong>Token:</strong> ${test.token}</p>
          <p><strong>Tests:</strong> ${test.tests.join(', ')}</p>
          <p><strong>Findings:</strong> ${test.findings || 'No findings recorded'}</p>
          <p><strong>Completed:</strong> ${formatLabDate(test.completedAt)}</p>
          <div class="report-preview-box">${reportPreviewHtml(test.reportUrl)}</div>
        `;
        const openLink = document.getElementById('reportOpenLink');
        const downloadLink = document.getElementById('reportDownloadLink');
        if (test.reportUrl) {
          openLink.href = test.reportUrl;
          openLink.style.display = 'inline-block';
          downloadLink.href = test.reportUrl;
          downloadLink.style.display = 'inline-block';
        } else {
          openLink.style.display = 'none';
          openLink.removeAttribute('href');
          downloadLink.style.display = 'none';
          downloadLink.removeAttribute('href');
        }
        document.getElementById('reportViewModal').classList.add('active');
      }

      function closeReportModal() {
        document.getElementById('reportViewModal').classList.remove('active');
      }

      function closeResultModal() {
        document.getElementById("resultModal").classList.remove("active");
      }

      API.requireStaff(['lab_tech']).then(user => {
        if (user) {
          loadLabQueue();
          PollManager.start('lab', loadLabQueue, 5000);
        }
      });
    </script>
  </body>
</html>
