<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue Status - General OPD</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .live-queue-card { background: linear-gradient(135deg, var(--primary-light), var(--primary)); border-radius: var(--radius-lg); padding: 2rem; text-align: center; color: white; }
        .position-number { font-size: 5rem; font-weight: 800; }
        .waiting-animation { width: 100%; height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; overflow: hidden; margin: 1.5rem 0; }
        .waiting-progress { width: 0%; height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s ease; }
        .queue-list-item { display: flex; align-items: center; gap: 1rem; padding: 0.75rem; border-bottom: 1px solid var(--border); }
        .queue-list-item.current { background: rgba(59,151,151,0.1); border-left: 3px solid var(--secondary); }
        .priority-icon { color: var(--danger); }
        .refresh-btn { position: fixed; bottom: 2rem; right: 2rem; width: 56px; height: 56px; border-radius: 50%; background: var(--secondary); border: none; color: white; font-size: 1.5rem; cursor: pointer; transition: transform 0.3s; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-lg); }
        .refresh-btn:hover { transform: rotate(180deg); }
        .refresh-btn .med-icon-svg { stroke: #fff; }
        .sound-toggle { position: fixed; bottom: 2rem; left: 2rem; width: 48px; height: 48px; border-radius: 50%; background: var(--surface); border: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow); }
        .sound-toggle .med-icon-svg { stroke: var(--secondary-dark); }
        .slot-info { background: rgba(255,255,255,0.2); border-radius: var(--radius); padding: 0.5rem 1rem; margin-top: 1rem; font-size: 0.875rem; }
        .status-timeline { display: flex; justify-content: space-between; margin-top: 1.5rem; }
        .status-step { text-align: center; flex: 1; }
        .status-step .dot { width: 12px; height: 12px; background: rgba(255,255,255,0.3); border-radius: 50%; margin: 0 auto 0.5rem; }
        .status-step.active .dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
        .status-step.completed .dot { background: var(--success); }
        .status-step-label { font-size: 0.7rem; opacity: 0.7; }
        .status-step.active .status-step-label { opacity: 1; font-weight: bold; }
        .alert-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 2rem; text-align: center; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo"><span class="logo-icon"></span><span class="logo-text">GENERAL OPD</span></div>
            <div class="nav-buttons">
                <a href="dashboard.html" class="btn btn-outline">Dashboard</a>
                <a href="../index.html" class="btn btn-primary">Home</a>
            </div>
        </div>
    </nav>

    <div style="max-width: 800px; margin: 100px auto 2rem; padding: 0 1.5rem;" id="queueStatusContainer">
        <!-- Content will be dynamically populated based on time validation -->
    </div>

    <div class="refresh-btn" onclick="refreshQueue()" data-icon="refresh" data-icon-size="20"></div>
    <div class="sound-toggle" onclick="toggleSound()" id="soundToggle" data-icon="bell" data-icon-size="22"></div>

    <script src="../js/icons.js"></script>
    <script src="../js/app.js?v=20260710f"></script>
    <script src="../js/api.js?v=20260710f"></script>
    <script>
        const SLOT_CONFIG = TimeUtils.SLOT_CONFIG;

        let currentPatient = null;
        let soundEnabled = true;
        let queuePollTimer = null;
        let lastQueuePosition = null;

        function hasCheckedIn() {
            if (!currentPatient) return false;
            return ['checked-in', 'checked_in', 'consulting', 'pending_lab', 'pending_pharmacy'].includes(currentPatient.status);
        }

        function getSlotStatusMessage(patient) {
            return TimeUtils.getAppointmentSlotStatus({
                date: patient.appointmentDate,
                slot: patient.slotType,
                start_time: patient.startTime,
                end_time: patient.endTime,
                status: patient.status === 'checked-in' ? 'checked_in' : 'booked',
            });
        }

        function renderQueueStatus() {
            const container = document.getElementById('queueStatusContainer');
            if (!currentPatient) {
                container.innerHTML = '<div class="alert-card"><div class="spinner"></div><p style="margin-top:1rem;">Loading queue status...</p></div>';
                return;
            }

            const slotStatus = getSlotStatusMessage(currentPatient);
            const checkedIn = hasCheckedIn();

            if (slotStatus.isUpcoming && !checkedIn) {
                container.innerHTML = `
                    <div class="alert-card">
                        <div class="med-icon-box lg" style="margin:0 auto 1rem;" data-icon="clock" data-icon-size="36"></div>
                        <h2 style="color: var(--warning); margin-bottom: 1rem;">Slot Not Started Yet</h2>
                        <p>Your slot (${SLOT_CONFIG[currentPatient.slotType]?.displayTime || currentPatient.slotType}) hasn't started yet. Check-in opens 15 minutes before slot start.</p>
                        <div class="slot-info" style="background: var(--background); color: var(--text-primary); margin-top: 1.5rem;">
                            <strong>Your Appointment:</strong><br>
                            Date: ${currentPatient.appointmentDate}<br>
                            Doctor: ${currentPatient.doctor}<br>
                            Token: ${currentPatient.token}<br>
                            Estimated: ${currentPatient.appointmentTime}
                        </div>
                    </div>`;
                return;
            }

            if (slotStatus.isPassed && !checkedIn) {
                container.innerHTML = `
                    <div class="alert-card">
                        <div style="margin-bottom: 1rem;">${medIconSvg('warning', 36)}</div>
                        <h2 style="color: var(--danger); margin-bottom: 1rem;">No-show</h2>
                        <p>Your slot has ended. Please book a new appointment.</p>
                        <a href="booking.html" class="btn btn-primary" style="margin-top: 1.5rem;">Book New Appointment →</a>
                    </div>`;
                return;
            }

            if (!checkedIn) {
                container.innerHTML = `
                    <div class="alert-card">
                        <div style="margin-bottom: 1rem;">${medIconSvg('hospital', 36)}</div>
                        <h2 style="color: var(--warning); margin-bottom: 1rem;">Not Checked In Yet</h2>
                        <p>Please check in at reception to join the live queue.</p>
                        <div class="slot-info" style="background: var(--background); color: var(--text-primary); margin-top: 1.5rem;">
                            Token: ${currentPatient.token} · Doctor: ${currentPatient.doctor}<br>
                            Slot: ${SLOT_CONFIG[currentPatient.slotType]?.displayTime || currentPatient.slotType}
                        </div>
                        <button class="btn btn-primary" style="margin-top: 1.5rem;" onclick="refreshQueue()">Refresh</button>
                    </div>`;
                return;
            }

            const position = currentPatient.queuePosition || 1;
            const total = currentPatient.totalInQueue || position;
            const progressPercent = Math.min(100, Math.max(8, ((total - position + 1) / total) * 100));
            const estimatedWait = Math.max(0, (position - 1) * 8);

            container.innerHTML = `
                <div class="live-queue-card">
                    <div style="margin-bottom: 1rem;"><span class="badge" style="background: rgba(255,255,255,0.2);">🔴 LIVE QUEUE STATUS</span></div>
                    <div class="position-number" id="queuePosition">${position}</div>
                    <div style="font-size: 1.25rem;">Your Position in Queue</div>
                    <div style="margin: 0.5rem 0;">Token: <strong>${currentPatient.token}</strong> · ${currentPatient.doctor}</div>
                    <div class="waiting-animation">
                        <div class="waiting-progress" id="waitingProgress" style="width: ${progressPercent}%"></div>
                    </div>
                    <div style="font-size: 1.5rem; font-weight: bold;" id="estimatedWait">Estimated Wait: ~${estimatedWait} minutes</div>
                    <div class="slot-info">
                        <strong>Slot:</strong> ${SLOT_CONFIG[currentPatient.slotType]?.displayTime || currentPatient.slotType} ·
                        <strong>${total}</strong> patient(s) in queue
                    </div>
                </div>
                <div class="status-timeline" style="margin-top: 1rem;">
                    <div class="status-step completed"><div class="dot"></div><div class="status-step-label">Token Booked</div></div>
                    <div class="status-step completed"><div class="dot"></div><div class="status-step-label">Checked In</div></div>
                    <div class="status-step active"><div class="dot"></div><div class="status-step-label">In Queue</div></div>
                    <div class="status-step"><div class="dot"></div><div class="status-step-label">Consultation</div></div>
                    <div class="status-step"><div class="dot"></div><div class="status-step-label">Completed</div></div>
                </div>
                <div class="card" style="margin-top: 1.5rem; background: var(--surface); color: var(--text-primary);">
                    <h3 style="margin-bottom: 1rem;">Queue Information</h3>
                    <p>Status: <strong>${currentPatient.displayStatus || AppointmentStatus.label(currentPatient.status)}</strong></p>
                    <p>You are <strong>#${position}</strong> of <strong>${total}</strong> patients waiting. Please stay in the designated waiting area until your token is called.</p>
                    <button class="btn btn-outline" style="margin-top: 1rem;" onclick="window.print()">Print Token</button>
                </div>`;
        }

        async function refreshQueue() {
            const res = await API.patientQueueStatus();
            if (!res.success || !res.has_active) {
                document.getElementById('queueStatusContainer').innerHTML = '<div class="alert-card"><p>No active appointment today.</p><a href="booking.html" class="btn btn-primary">Book Appointment</a></div>';
                return;
            }
            const t = res.token;
            const newPosition = res.queue_position || 1;
            if (lastQueuePosition !== null && soundEnabled && newPosition < lastQueuePosition) {
                if (newPosition <= 2) playSound();
                if (newPosition === 1) Toast.show('You are next! Please be ready.', 'success');
                else if (newPosition === 2) Toast.show('You are almost next in line.', 'warning');
            }
            lastQueuePosition = newPosition;
            currentPatient = {
                name: t.patient_name,
                token: t.token_number,
                doctor: t.doctor_name,
                slotType: (t.slot_type || t.slot_type_raw || 'MORNING').toUpperCase(),
                appointmentDate: t.date,
                appointmentTime: t.estimated_time,
                startTime: t.start_time,
                endTime: t.end_time,
                status: t.status,
                displayStatus: t.display_status || AppointmentStatus.label(t.status),
                queuePosition: newPosition,
                totalInQueue: res.queue_length || newPosition,
            };
            renderQueueStatus();
        }

        function playSound() {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                oscillator.frequency.value = 880;
                gainNode.gain.value = 0.3;
                oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 1);
                oscillator.stop(audioContext.currentTime + 1);
            } catch (e) { /* audio not supported */ }
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            const el = document.getElementById('soundToggle');
            el.innerHTML = medIconSvg(soundEnabled ? 'bell' : 'bellOff', 22);
            Toast.show(`Sound alerts ${soundEnabled ? 'enabled' : 'disabled'}`, 'info');
        }

        async function initQueueStatus() {
            const me = await API.authMe();
            if (!me.success || me.user.role !== 'patient') {
                window.location.href = 'login.html';
                return;
            }
            await refreshQueue();
            PollManager.start('patient-queue', refreshQueue, 5000);
        }
        initQueueStatus();
    </script>
</body>
</html>
