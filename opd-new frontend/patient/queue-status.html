<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue Status - Smart OPD</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .live-queue-card { background: linear-gradient(135deg, var(--primary-light), var(--primary)); border-radius: var(--radius-lg); padding: 2rem; text-align: center; color: white; }
        .position-number { font-size: 5rem; font-weight: 800; }
        .waiting-animation { width: 100%; height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; overflow: hidden; margin: 1.5rem 0; }
        .waiting-progress { width: 0%; height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s ease; }
        .queue-list-item { display: flex; align-items: center; gap: 1rem; padding: 0.75rem; border-bottom: 1px solid var(--border); }
        .queue-list-item.current { background: rgba(59,151,151,0.1); border-left: 3px solid var(--secondary); }
        .priority-icon { color: var(--danger); }
        .refresh-btn { position: fixed; bottom: 2rem; right: 2rem; width: 56px; height: 56px; border-radius: 50%; background: var(--secondary); border: none; color: white; font-size: 1.5rem; cursor: pointer; transition: transform 0.3s; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-lg); }
        .refresh-btn:hover { transform: rotate(180deg); }
        .sound-toggle { position: fixed; bottom: 2rem; left: 2rem; width: 48px; height: 48px; border-radius: 50%; background: var(--surface); border: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow); }
        .slot-info { background: rgba(255,255,255,0.2); border-radius: var(--radius); padding: 0.5rem 1rem; margin-top: 1rem; font-size: 0.875rem; }
        .status-timeline { display: flex; justify-content: space-between; margin-top: 1.5rem; }
        .status-step { text-align: center; flex: 1; }
        .status-step .dot { width: 12px; height: 12px; background: rgba(255,255,255,0.3); border-radius: 50%; margin: 0 auto 0.5rem; }
        .status-step.active .dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
        .status-step.completed .dot { background: var(--success); }
        .status-step-label { font-size: 0.7rem; opacity: 0.7; }
        .status-step.active .status-step-label { opacity: 1; font-weight: bold; }
        .alert-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 2rem; text-align: center; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo"><span class="logo-icon">⚡</span><span class="logo-text">SMART OPD</span></div>
            <div class="nav-buttons">
                <a href="dashboard.html" class="btn btn-outline">Dashboard</a>
                <a href="../index.html" class="btn btn-primary">Home</a>
            </div>
        </div>
    </nav>

    <div style="max-width: 800px; margin: 100px auto 2rem; padding: 0 1.5rem;" id="queueStatusContainer">
        <!-- Content will be dynamically populated based on time validation -->
    </div>

    <div class="refresh-btn" onclick="refreshQueue()">🔄</div>
    <div class="sound-toggle" onclick="toggleSound()" id="soundToggle">🔔</div>

    <script src="../js/app.js"></script>
    <script src="../js/api.js"></script>
    <script>
        // Slot time definitions
        const SLOT_CONFIG = {
            'MORNING': { startHour: 9, startMinute: 0, endHour: 11, endMinute: 0, displayTime: '9:00 AM - 11:00 AM' },
            'AFTERNOON': { startHour: 12, startMinute: 0, endHour: 14, endMinute: 0, displayTime: '12:00 PM - 2:00 PM' },
            'EVENING': { startHour: 15, startMinute: 0, endHour: 17, endMinute: 0, displayTime: '3:00 PM - 5:00 PM' }
        };

        // Mock data for the logged-in patient
        let currentPatient = {
            name: "Samikshya Shrestha",
            patientId: "PAT123456",
            token: "M12",
            doctor: "Dr. Rajesh Sharma",
            slotType: "MORNING",
            appointmentDate: "2026-06-07",
            appointmentTime: "10:30 AM",
            status: "checked-in", // Could be 'booked', 'checked-in', 'completed', 'expired'
            checkInTime: "2026-06-07T09:45:00",
            queuePosition: 3,
            totalInQueue: 8
        };

        let soundEnabled = true;
        let queueInterval = null;
        let currentPosition = currentPatient.queuePosition;
        let totalInQueue = currentPatient.totalInQueue;

        // Function to check if current time is within slot time
        function isWithinSlotTime(slotType, appointmentDate) {
            const now = new Date();
            const appointmentDateObj = new Date(appointmentDate);
            
            // Check if it's the same day
            if (now.toDateString() !== appointmentDateObj.toDateString()) {
                return { valid: false, reason: "not_same_day", message: "Your appointment is on a different day. Queue status will be available on your appointment day." };
            }
            
            const slot = SLOT_CONFIG[slotType];
            if (!slot) return { valid: false, reason: "invalid_slot", message: "Invalid slot type" };
            
            const currentHour = now.getHours();
            const currentMinute = now.getMinutes();
            
            const currentTotalMinutes = currentHour * 60 + currentMinute;
            const slotStartTotalMinutes = slot.startHour * 60 + slot.startMinute;
            const slotEndTotalMinutes = slot.endHour * 60 + slot.endMinute;
            
            if (currentTotalMinutes < slotStartTotalMinutes) {
                return { valid: false, reason: "not_started", message: `Your slot (${slot.displayTime}) hasn't started yet. Please check back at ${slot.startHour}:${slot.startMinute.toString().padStart(2,'0')} AM.` };
            }
            
            if (currentTotalMinutes > slotEndTotalMinutes) {
                return { valid: false, reason: "expired", message: `Your slot (${slot.displayTime}) has already ended. Please book a new appointment.` };
            }
            
            return { valid: true, reason: "active", message: "Your slot is active" };
        }

        // Function to check if patient has checked in
        function hasCheckedIn() {
            return currentPatient.status === 'checked-in' || currentPatient.status === 'in-queue';
        }

        // Function to render the queue status based on time validation
        function renderQueueStatus() {
            const container = document.getElementById('queueStatusContainer');
            const timeValidation = isWithinSlotTime(currentPatient.slotType, currentPatient.appointmentDate);
            const checkedIn = hasCheckedIn();
            
            // Case 1: Slot not started yet
            if (!timeValidation.valid && timeValidation.reason === "not_started") {
                container.innerHTML = `
                    <div class="alert-card">
                        <div style="font-size: 3rem; margin-bottom: 1rem;">⏰</div>
                        <h2 style="color: var(--warning); margin-bottom: 1rem;">Slot Not Started Yet</h2>
                        <p>${timeValidation.message}</p>
                        <div class="slot-info" style="background: var(--background); color: var(--text-primary); margin-top: 1.5rem;">
                            <strong>Your Appointment Details:</strong><br>
                            Date: ${currentPatient.appointmentDate}<br>
                            Doctor: ${currentPatient.doctor}<br>
                            Token: ${currentPatient.token}<br>
                            Slot: ${SLOT_CONFIG[currentPatient.slotType].displayTime}<br>
                            Estimated Time: ${currentPatient.appointmentTime}
                        </div>
                        <button class="btn btn-primary" style="margin-top: 1.5rem;" onclick="location.reload()">Refresh</button>
                    </div>
                `;
                return;
            }
            
            // Case 2: Slot has expired
            if (!timeValidation.valid && timeValidation.reason === "expired") {
                container.innerHTML = `
                    <div class="alert-card">
                        <div style="font-size: 3rem; margin-bottom: 1rem;">⛔</div>
                        <h2 style="color: var(--danger); margin-bottom: 1rem;">Slot Expired</h2>
                        <p>${timeValidation.message}</p>
                        <div class="slot-info" style="background: var(--background); color: var(--text-primary); margin-top: 1.5rem;">
                            <strong>Your Appointment Details:</strong><br>
                            Date: ${currentPatient.appointmentDate}<br>
                            Doctor: ${currentPatient.doctor}<br>
                            Token: ${currentPatient.token}<br>
                            Slot: ${SLOT_CONFIG[currentPatient.slotType].displayTime}
                        </div>
                        <a href="booking.html" class="btn btn-primary" style="margin-top: 1.5rem;">Book New Appointment →</a>
                    </div>
                `;
                return;
            }
            
            // Case 3: Slot active but not checked in
            if (timeValidation.valid && !checkedIn) {
                const slotStart = SLOT_CONFIG[currentPatient.slotType].startHour;
                const slotStartMin = SLOT_CONFIG[currentPatient.slotType].startMinute;
                const checkInDeadline = new Date(currentPatient.appointmentDate);
                checkInDeadline.setHours(slotStart + 1, slotStartMin, 0);
                
                container.innerHTML = `
                    <div class="alert-card">
                        <div style="font-size: 3rem; margin-bottom: 1rem;">🏥</div>
                        <h2 style="color: var(--warning); margin-bottom: 1rem;">Not Checked In Yet</h2>
                        <p>You have not checked in at reception. Please check in to see your queue position.</p>
                        <div class="slot-info" style="background: var(--background); color: var(--text-primary); margin-top: 1.5rem;">
                            <strong>Check-in Window:</strong><br>
                            Please check in between ${SLOT_CONFIG[currentPatient.slotType].startHour}:${slotStartMin.toString().padStart(2,'0')} AM and ${SLOT_CONFIG[currentPatient.slotType].endHour}:${SLOT_CONFIG[currentPatient.slotType].endMinute.toString().padStart(2,'0')} PM
                        </div>
                        <div class="slot-info" style="background: var(--background); color: var(--text-primary); margin-top: 1rem;">
                            <strong>Your Appointment Details:</strong><br>
                            Token: ${currentPatient.token}<br>
                            Doctor: ${currentPatient.doctor}<br>
                            Slot: ${SLOT_CONFIG[currentPatient.slotType].displayTime}
                        </div>
                        <button class="btn btn-primary" style="margin-top: 1.5rem;" onclick="location.reload()">Refresh</button>
                    </div>
                `;
                return;
            }
            
            // Case 4: Slot active and checked in - Show live queue
            if (timeValidation.valid && checkedIn) {
                const totalPatients = totalInQueue;
                const progressPercent = ((totalPatients - currentPosition) / totalPatients) * 100;
                const estimatedWait = currentPosition * 8; // 8 minutes per patient
                
                container.innerHTML = `
                    <div class="live-queue-card">
                        <div style="margin-bottom: 1rem;">
                            <span class="badge" style="background: rgba(255,255,255,0.2);">🔴 LIVE QUEUE STATUS</span>
                        </div>
                        <div class="position-number" id="queuePosition">${currentPosition}</div>
                        <div style="font-size: 1.25rem;">Your Position in Queue</div>
                        <div style="margin: 0.5rem 0;">
                            Token: <strong>${currentPatient.token}</strong> | Dr. ${currentPatient.doctor.split(' ')[1]}
                        </div>
                        <div class="waiting-animation">
                            <div class="waiting-progress" id="waitingProgress" style="width: ${progressPercent}%"></div>
                        </div>
                        <div style="font-size: 1.5rem; font-weight: bold;" id="estimatedWait">Estimated Wait: ${estimatedWait} minutes</div>
                        <div id="priorityNote" style="margin-top: 1rem; opacity: 0.9;"></div>
                        <div class="slot-info">
                            <strong>Slot:</strong> ${SLOT_CONFIG[currentPatient.slotType].displayTime} | 
                            <strong>Checked in at:</strong> ${new Date(currentPatient.checkInTime).toLocaleTimeString()}
                        </div>
                    </div>
                    
                    <div class="status-timeline" style="margin-top: 1rem;">
                        <div class="status-step completed"><div class="dot"></div><div class="status-step-label">Token Booked</div></div>
                        <div class="status-step completed"><div class="dot"></div><div class="status-step-label">Checked In</div></div>
                        <div class="status-step active" id="queueStatusStep"><div class="dot"></div><div class="status-step-label">In Queue</div></div>
                        <div class="status-step"><div class="dot"></div><div class="status-step-label">Consultation</div></div>
                        <div class="status-step"><div class="dot"></div><div class="status-step-label">Completed</div></div>
                    </div>
                    
                    <div class="card" style="margin-top: 1.5rem; background: var(--surface); color: var(--text-primary);">
                        <h3 style="margin-bottom: 1rem;">Current Waiting Queue</h3>
                        <div id="fullQueueList"></div>
                    </div>
                    
                    <div class="card" style="margin-top: 1rem; background: rgba(59,151,151,0.05);">
                        <h3>📋 Important Information</h3>
                        <ul style="margin-left: 1.5rem;">
                            <li>Priority is given to elderly (60+) and disabled patients</li>
                            <li>Please wait in the designated waiting area near Room 204</li>
                            <li>Your token will be announced when it's your turn</li>
                            <li>Keep your token number ready for verification</li>
                        </ul>
                    </div>
                `;
                
                // Render the full queue list
                renderFullQueue();
                
                // Start auto-refresh for queue position
                startQueueSimulation();
                return;
            }
            
            // Default case: Show loading or error
            container.innerHTML = `
                <div class="alert-card">
                    <div class="spinner"></div>
                    <p style="margin-top: 1rem;">Loading queue status...</p>
                </div>
            `;
        }
        
        function renderFullQueue() {
            // Mock queue data with priority ordering
            const queueData = [
                { position: 1, token: "M10", patient: "Ram Prasad", age: 72, priority: true, status: "In Consultation", checkedIn: true },
                { position: 2, token: "M11", patient: "Sita Gurung", age: 35, priority: false, status: "Waiting", checkedIn: true },
                { position: currentPosition, token: currentPatient.token, patient: "You", age: 21, priority: false, status: "Waiting", isCurrent: true, checkedIn: true },
                { position: 4, token: "M13", patient: "John Doe", age: 28, priority: false, status: "Waiting", checkedIn: true },
                { position: 5, token: "A05", patient: "Hari Prasad", age: 65, priority: true, status: "Waiting", checkedIn: true },
                { position: 6, token: "A06", patient: "Gita Sharma", age: 42, priority: false, status: "Waiting", checkedIn: true },
                { position: 7, token: "M14", patient: "Bikram Thapa", age: 58, priority: false, status: "Waiting", checkedIn: true },
                { position: 8, token: "M15", patient: "Sunita Karki", age: 70, priority: true, status: "Waiting", checkedIn: true }
            ];
            
            // Calculate priority patients ahead
            const priorityAhead = queueData.filter(q => q.priority && q.position < currentPosition).length;
            const priorityNote = document.getElementById('priorityNote');
            if (priorityNote) {
                priorityNote.innerHTML = priorityAhead > 0 ? `⚠️ ${priorityAhead} priority patient(s) ahead of you (Elderly/Disabled are served first)` : '✓ No priority patients ahead of you';
            }
            
            const queueList = document.getElementById('fullQueueList');
            if (queueList) {
                queueList.innerHTML = queueData.map(q => `
                    <div class="queue-list-item ${q.isCurrent ? 'current' : ''}">
                        <div style="width: 60px; font-weight: bold;">#${q.position}</div>
                        <div style="width: 80px;"><strong>${q.token}</strong></div>
                        <div style="flex: 1;">
                            ${q.patient} ${q.priority ? '<span class="priority-icon">🔴 Priority</span>' : ''}
                            ${q.isCurrent ? '<span class="badge badge-info" style="margin-left: 0.5rem;">You</span>' : ''}
                        </div>
                        <div>
                            <span class="badge ${q.status === 'In Consultation' ? 'badge-warning' : 'badge-waiting'}">${q.status}</span>
                        </div>
                    </div>
                `).join('');
            }
        }
        
        function startQueueSimulation() {
            if (queueInterval) clearInterval(queueInterval);
            
            queueInterval = setInterval(() => {
                if (currentPosition > 1) {
                    currentPosition--;
                    const positionElem = document.getElementById('queuePosition');
                    const waitElem = document.getElementById('estimatedWait');
                    const progressElem = document.getElementById('waitingProgress');
                    
                    if (positionElem) positionElem.innerText = currentPosition;
                    if (waitElem) waitElem.innerText = `Estimated Wait: ${currentPosition * 8} minutes`;
                    
                    const totalPatients = totalInQueue;
                    const progressPercent = ((totalPatients - currentPosition) / totalPatients) * 100;
                    if (progressElem) progressElem.style.width = `${progressPercent}%`;
                    
                    // Update queue list display
                    renderFullQueue();
                    
                    // Play sound alerts when getting close
                    if (soundEnabled) {
                        if (currentPosition === 2) {
                            playSound();
                            Toast.show('🔔 You are almost there! Next in line after current patient.', 'warning');
                        }
                        if (currentPosition === 1) {
                            playSound();
                            Toast.show('🔔 You are next! Please be ready for consultation.', 'success');
                            // Update status step
                            const queueStep = document.getElementById('queueStatusStep');
                            if (queueStep) {
                                queueStep.classList.remove('active');
                                queueStep.classList.add('completed');
                            }
                            clearInterval(queueInterval);
                        }
                    }
                } else {
                    clearInterval(queueInterval);
                }
            }, 30000); // Update every 30 seconds
        }
        
        function playSound() {
            try {
                // Simple beep sound using Web Audio API
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                oscillator.frequency.value = 880;
                gainNode.gain.value = 0.3;
                oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 1);
                oscillator.stop(audioContext.currentTime + 1);
            } catch(e) { console.log('Audio not supported'); }
        }
        
        function refreshQueue() {
            Toast.show('Refreshing queue status...', 'info');
            renderQueueStatus();
        }
        
        function toggleSound() {
            soundEnabled = !soundEnabled;
            const toggleBtn = document.getElementById('soundToggle');
            if (toggleBtn) toggleBtn.innerHTML = soundEnabled ? '🔔' : '🔕';
            Toast.show(`Sound alerts ${soundEnabled ? 'enabled' : 'disabled'}`, 'info');
        }
        
        // Load patient data from API
        async function initQueueStatus() {
            const me = await API.authMe();
            if (!me.success || me.user.role !== 'patient') {
                window.location.href = 'login.html';
                return;
            }
            const res = await API.patientQueueStatus();
            if (!res.success || !res.has_active) {
                document.getElementById('queueStatusContainer').innerHTML = '<div class="alert-card"><p>No active appointment today.</p><a href="booking.html" class="btn btn-primary">Book Appointment</a></div>';
                return;
            }
            const t = res.token;
            currentPatient = {
                name: t.patient_name,
                patientId: me.user.patient_id,
                token: t.token_number,
                doctor: t.doctor_name,
                slotType: (t.slot_type || t.slot_type_raw || 'MORNING').toUpperCase(),
                appointmentDate: t.date,
                appointmentTime: t.estimated_time,
                status: t.status === 'checked_in' ? 'checked-in' : t.status,
                queuePosition: res.queue_position || 1,
                totalInQueue: res.queue_length || 1,
            };
            currentPosition = currentPatient.queuePosition;
            totalInQueue = currentPatient.totalInQueue;
            renderQueueStatus();
            setInterval(async () => {
                const u = await API.patientQueueStatus();
                if (u.success && u.has_active) {
                    currentPosition = u.queue_position || currentPosition;
                    renderQueueStatus();
                }
            }, 10000);
        }
        initQueueStatus();
    </script>
</body>
</html>
