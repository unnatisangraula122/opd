<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart OPD - Hospital Management System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        header {
            background: linear-gradient(135deg, #2c3e50, #3498db);
            color: white;
            padding: 30px;
            text-align: center;
        }
        header h1 { font-size: 2em; margin-bottom: 10px; }
        .role-selector {
            display: flex;
            background: #f0f0f0;
            border-bottom: 2px solid #ddd;
        }
        .role-btn {
            flex: 1;
            padding: 15px;
            font-size: 16px;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        .role-btn.active { background: #3498db; color: white; }
        .panel { display: none; padding: 30px; }
        .panel.active { display: block; }
        .card {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .search-box input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        .btn-primary { background: #3498db; color: white; }
        .btn-success { background: #27ae60; color: white; }
        .btn-warning { background: #f39c12; color: white; }
        .slots-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .slot-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            cursor: pointer;
        }
        .slot-card.selected { border-color: #27ae60; background: #e8f8f5; }
        .queue-item {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid #3498db;
        }
        .queue-item.elderly { border-left-color: #e74c3c; background: #fff5f5; }
        .result-card { background: #d4edda; padding: 15px; border-radius: 8px; margin-top: 15px; }
        .error-card { background: #f8d7da; color: #721c24; }
        .search-box { display: flex; gap: 10px; }
        .search-box input { flex: 1; }
        .consult-actions { display: flex; gap: 10px; align-items: center; }
        .consult-actions input { flex: 1; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏥 Smart OPD Management System</h1>
            <p>Nepal's First Intelligent OPD Workflow System</p>
        </header>

        <div class="role-selector">
            <button class="role-btn active" onclick="showRole('patient')">👤 Patient</button>
            <button class="role-btn" onclick="showRole('reception')">📋 Reception</button>
            <button class="role-btn" onclick="showRole('doctor')">👨‍⚕️ Doctor</button>
        </div>

        <!-- PATIENT PANEL -->
        <div id="patient-panel" class="panel active">
            <h2>📝 Book an Appointment</h2>
            <div class="card">
                <h3>Step 1: Available Slots</h3>
                <button onclick="loadSlots()" class="btn-primary">🔄 Load Available Slots</button>
                <div id="slots-list" class="slots-grid"></div>
            </div>
            <div class="card" id="booking-form" style="display:none;">
                <h3>Step 2: Your Details</h3>
                <form onsubmit="bookToken(event)">
                    <input type="hidden" id="selected-slot-id">
                    <div class="form-group">
                        <label>Full Name:</label>
                        <input type="text" id="patient-name" required>
                    </div>
                    <div class="form-group">
                        <label>Age:</label>
                        <input type="number" id="patient-age" required>
                    </div>
                    <div class="form-group">
                        <label>Phone:</label>
                        <input type="tel" id="patient-phone" required>
                    </div>
                    <button type="submit" class="btn-success">✅ Confirm Booking</button>
                    <button type="button" onclick="cancelBooking()" class="btn-primary">Cancel</button>
                </form>
            </div>
            <div id="booking-result"></div>
        </div>

        <!-- RECEPTION PANEL -->
        <div id="reception-panel" class="panel">
            <h2>📋 Reception Dashboard</h2>
            <div class="card">
                <h3>Search Patient</h3>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Token Number or Phone">
                    <button onclick="searchPatient()" class="btn-primary">🔍 Search</button>
                </div>
                <div id="search-results"></div>
            </div>
            <div class="card">
                <h3>Current Waiting Queue</h3>
                <button onclick="loadWaitingQueue()" class="btn-primary">🔄 Refresh Queue</button>
                <div id="waiting-queue"></div>
            </div>
        </div>

        <!-- DOCTOR PANEL -->
        <div id="doctor-panel" class="panel">
            <h2>👨‍⚕️ Doctor Dashboard</h2>
            <div class="card">
                <h3>Select Doctor</h3>
                <select id="doctor-select">
                    <option value="1">Dr. Sharma (Cardiologist)</option>
                </select>
                <button onclick="loadDoctorQueue()" class="btn-primary">🔄 Load My Queue</button>
            </div>
            <div class="card">
                <h3>My Patient Queue</h3>
                <div id="doctor-queue"></div>
            </div>
            <div class="card">
                <h3>Consultation Actions</h3>
                <div class="consult-actions">
                    <input type="number" id="consult-token-id" placeholder="Enter Token ID">
                    <button onclick="startConsultation()" class="btn-warning">▶️ Start Consultation</button>
                    <button onclick="completeConsultation()" class="btn-success">✅ Complete Consultation</button>
                </div>
                <div id="consult-result"></div>
            </div>
        </div>
    </div>

    <script>
        // Use relative URL - works with Django
        const API_BASE_URL = '/api/core';
        
        // Global variable for selected slot
        let selectedSlotId = null;

        // Show/hide panels
        function showRole(role) {
            document.querySelectorAll('.panel').forEach(panel => panel.classList.remove('active'));
            document.querySelectorAll('.role-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`${role}-panel`).classList.add('active');
            event.target.classList.add('active');
        }

        // ========== PATIENT FUNCTIONS ==========
        async function loadSlots() {
            const container = document.getElementById('slots-list');
            container.innerHTML = 'Loading...';
            
            try {
                const response = await fetch(`${API_BASE_URL}/slots/`);
                const data = await response.json();
                
                if (data.success && data.slots && data.slots.length > 0) {
                    container.innerHTML = '';
                    data.slots.forEach(slot => {
                        const slotDiv = document.createElement('div');
                        slotDiv.className = 'slot-card';
                        slotDiv.onclick = () => selectSlot(slot.slot_id);
                        slotDiv.innerHTML = `
                            <h4>👨‍⚕️ ${slot.doctor_name}</h4>
                            <p>📅 ${slot.date}</p>
                            <p>⏰ ${slot.slot_type.toUpperCase()} (${slot.start_time} - ${slot.end_time})</p>
                            <p>🎫 Available: <strong>${slot.tokens_available}</strong> / ${slot.max_tokens}</p>
                        `;
                        container.appendChild(slotDiv);
                    });
                } else {
                    container.innerHTML = '<p>⚠️ No available slots. Please add slots via Admin panel.</p>';
                }
            } catch (error) {
                console.error('Error:', error);
                container.innerHTML = '<p class="error-card">❌ Cannot connect to server. Make sure Django is running.</p>';
            }
        }

        function selectSlot(slotId) {
            selectedSlotId = slotId;
            document.getElementById('selected-slot-id').value = slotId;
            document.getElementById('booking-form').style.display = 'block';
            
            // Highlight selected
            document.querySelectorAll('.slot-card').forEach(card => card.classList.remove('selected'));
            event.target.closest('.slot-card').classList.add('selected');
        }

        function cancelBooking() {
            document.getElementById('booking-form').style.display = 'none';
            document.getElementById('selected-slot-id').value = '';
            document.getElementById('booking-result').innerHTML = '';
        }

        async function bookToken(event) {
            event.preventDefault();
            
            const slotId = document.getElementById('selected-slot-id').value;
            const patientName = document.getElementById('patient-name').value;
            const patientAge = document.getElementById('patient-age').value;
            const patientPhone = document.getElementById('patient-phone').value;
            
            if (!slotId) {
                alert('Please select a slot first');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE_URL}/book/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        slot_id: parseInt(slotId),
                        patient_name: patientName,
                        patient_age: parseInt(patientAge),
                        patient_phone: patientPhone
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('booking-result').innerHTML = `
                        <div class="result-card">
                            ✅ <strong>Booking Successful!</strong><br>
                            🎫 Token: ${data.token.token_number}<br>
                            ⏰ Estimated Time: ${data.token.estimated_time}<br>
                            ${data.token.is_elderly ? '🔴 Senior Citizen Priority Applied' : ''}
                        </div>
                    `;
                    cancelBooking();
                    loadSlots(); // Refresh slots
                } else {
                    document.getElementById('booking-result').innerHTML = `<div class="result-card error-card">❌ ${data.error}</div>`;
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('booking-result').innerHTML = '<div class="result-card error-card">❌ Error booking token. Check console.</div>';
            }
        }

        // ========== RECEPTION FUNCTIONS ==========
        async function searchPatient() {
            const searchTerm = document.getElementById('search-input').value;
            if (!searchTerm) {
                alert('Please enter a token number or phone number');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE_URL}/search/?q=${encodeURIComponent(searchTerm)}`);
                const data = await response.json();
                
                const resultsDiv = document.getElementById('search-results');
                
                if (data.success && data.patients && data.patients.length > 0) {
                    let html = '<h4>📋 Search Results:</h4>';
                    data.patients.forEach(p => {
                        html += `
                            <div class="queue-item">
                                <div>
                                    <strong>🎫 ${p.token_number}</strong><br>
                                    👤 ${p.patient_name} (${p.patient_age} yrs)<br>
                                    📞 ${p.patient_phone}<br>
                                    Status: <strong>${p.status}</strong>
                                </div>
                                ${p.status === 'booked' ? 
                                    `<button onclick="checkInPatient(${p.token_id})" class="btn-success">✅ Check In</button>` : 
                                    `<span class="btn-primary" style="background:gray;">Already ${p.status}</span>`
                                }
                            </div>
                        `;
                    });
                    resultsDiv.innerHTML = html;
                } else {
                    resultsDiv.innerHTML = '<p>No patients found with that search term.</p>';
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('search-results').innerHTML = '<p class="error-card">❌ Error searching</p>';
            }
        }

        async function checkInPatient(tokenId) {
            try {
                const response = await fetch(`${API_BASE_URL}/check-in/${tokenId}/`, { method: 'POST' });
                const data = await response.json();
                
                if (data.success) {
                    alert(`✅ ${data.message}`);
                    searchPatient(); // Refresh search
                    loadWaitingQueue(); // Refresh queue
                } else {
                    alert(`❌ ${data.error}`);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error checking in patient');
            }
        }

        async function loadWaitingQueue() {
            try {
                const response = await fetch(`${API_BASE_URL}/waiting-queue/`);
                const data = await response.json();
                
                const queueDiv = document.getElementById('waiting-queue');
                
                if (data.success && data.queue_length > 0) {
                    let html = `<h4>🟢 ${data.queue_length} Patients Waiting:</h4>`;
                    data.queue.forEach(p => {
                        html += `
                            <div class="queue-item ${p.is_elderly ? 'elderly' : ''}">
                                <div>
                                    <strong>🎫 ${p.token_number}</strong><br>
                                    👤 ${p.patient_name} (${p.patient_age} yrs)<br>
                                    ${p.is_elderly ? '<span style="color:#e74c3c;">🔴 PRIORITY (Elderly)</span>' : ''}
                                </div>
                                <div>⏰ Checked in: ${p.checked_in_at || 'Just now'}</div>
                            </div>
                        `;
                    });
                    queueDiv.innerHTML = html;
                } else {
                    queueDiv.innerHTML = '<p>No patients currently waiting.</p>';
                }
            } catch (error) {
                console.error('Error:', error);
                queueDiv.innerHTML = '<p class="error-card">❌ Error loading queue</p>';
            }
        }

        // ========== DOCTOR FUNCTIONS ==========
        async function loadDoctorQueue() {
            const doctorId = document.getElementById('doctor-select').value;
            
            try {
                const response = await fetch(`${API_BASE_URL}/doctor-queue/${doctorId}/`);
                const data = await response.json();
                
                const queueDiv = document.getElementById('doctor-queue');
                
                if (data.success && data.queue_length > 0) {
                    let html = `<h4>👥 ${data.queue_length} Patients in Queue:</h4>`;
                    data.queue.forEach(p => {
                        html += `
                            <div class="queue-item ${p.is_elderly ? 'elderly' : ''}">
                                <div>
                                    <strong>Position ${p.position} | 🎫 ${p.token_number}</strong><br>
                                    👤 ${p.patient_name} (${p.patient_age} yrs)<br>
                                    ${p.is_elderly ? '<span style="color:#e74c3c;">🔴 PRIORITY (Elderly)</span>' : ''}
                                </div>
                                <button onclick="setConsultToken(${p.token_id})" class="btn-primary">Select for Consult</button>
                            </div>
                        `;
                    });
                    queueDiv.innerHTML = html;
                } else {
                    queueDiv.innerHTML = '<p>No patients in your queue.</p>';
                }
            } catch (error) {
                console.error('Error:', error);
                queueDiv.innerHTML = '<p class="error-card">❌ Error loading queue</p>';
            }
        }

        function setConsultToken(tokenId) {
            document.getElementById('consult-token-id').value = tokenId;
        }

        async function startConsultation() {
            const tokenId = document.getElementById('consult-token-id').value;
            if (!tokenId) {
                alert('Please select a patient from queue or enter Token ID');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE_URL}/start-consult/${tokenId}/`, { method: 'POST' });
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('consult-result').innerHTML = `<div class="result-card">✅ ${data.message}</div>`;
                    loadDoctorQueue(); // Refresh queue
                    document.getElementById('consult-token-id').value = '';
                } else {
                    document.getElementById('consult-result').innerHTML = `<div class="result-card error-card">❌ ${data.error}</div>`;
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('consult-result').innerHTML = '<div class="result-card error-card">❌ Error starting consultation</div>';
            }
        }

        async function completeConsultation() {
            const tokenId = document.getElementById('consult-token-id').value;
            if (!tokenId) {
                alert('Please enter Token ID');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE_URL}/complete-consult/${tokenId}/`, { method: 'POST' });
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('consult-result').innerHTML = `
                        <div class="result-card">
                            ✅ ${data.message}<br>
                            ⏱️ Consultation took: ${data.token.consultation_duration_minutes || '?'} minutes
                        </div>
                    `;
                    loadDoctorQueue(); // Refresh queue
                    document.getElementById('consult-token-id').value = '';
                } else {
                    document.getElementById('consult-result').innerHTML = `<div class="result-card error-card">❌ ${data.error}</div>`;
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('consult-result').innerHTML = '<div class="result-card error-card">❌ Error completing consultation</div>';
            }
        }
    </script>
</body>
</html>
